name: CI/CD — API

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_WEBAPP_NAME: 'ladyruth-api'   # ← update to your App Service name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore LadyRuth.API.csproj

      - name: Build
        run: dotnet build LadyRuth.API.csproj --no-restore --configuration Release

      - name: Publish
        run: dotnet publish LadyRuth.API.csproj --no-build --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
